services:
  backend:
    image: amyynjendly/drapeai-backend:1.0.0
    build:
      context: ./drapeai-backend
      dockerfile: Dockerfile
    container_name: drapeai-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://host.docker.internal:27017/drapeai
    networks:
      - drapeai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: amyynjendly/drapeai-frontend:1.0.0
    build:
      context: ./drapeai-frontend
      dockerfile: Dockerfile
    container_name: drapeai-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - drapeai-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  drapeai-network:
    driver: bridge
