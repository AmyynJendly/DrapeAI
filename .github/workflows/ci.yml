name: DrapeAI Continuous Integration & Docker Hub Deployment

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-build:
    name: Build & Test Spring Boot Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Backend
        working-directory: ./drapeai-backend
        run: mvn clean package -B

  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./drapeai-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./drapeai-frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Frontend Assets
        working-directory: ./drapeai-frontend
        run: npm run build

  docker-build-push:
    name: Build & Push Docker Images to Docker Hub
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./drapeai-backend
          file: ./drapeai-backend/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && github.event_name != 'pull_request' }}
          tags: |
            amyynjendly/drapeai-backend:latest
            amyynjendly/drapeai-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./drapeai-frontend
          file: ./drapeai-frontend/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && github.event_name != 'pull_request' }}
          tags: |
            amyynjendly/drapeai-frontend:latest
            amyynjendly/drapeai-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
