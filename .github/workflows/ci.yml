name: DrapeAI Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-build:
    name: Build & Test Spring Boot Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Backend
        working-directory: ./drapeai-backend
        run: mvn clean package -B

  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./drapeai-frontend/package.json

      - name: Install Dependencies
        working-directory: ./drapeai-frontend
        run: |
          npm install
          chmod -R +x node_modules/.bin || true

      - name: Build Frontend Assets
        working-directory: ./drapeai-frontend
        run: npm run build

  docker-build:
    name: Validate Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Services
        run: docker compose build
